[tool.pytest.ini_options]
testpaths   = ["tests"]
addopts     = "-v --tb=short"

# Runtime dependencies (install via pip install -r requirements.txt or individually)
# requests, pandas, numpy, cairosvg, kaggle, tenacity, statsmodels, arch

# ---------------------------------------------------------------------------
# Ruff — linter + formatter (replaces flake8, isort, pyupgrade)
# ---------------------------------------------------------------------------
[tool.ruff]
target-version = "py311"
line-length    = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (unused imports, undefined names, etc.)
    "I",   # isort (import ordering)
    "UP",  # pyupgrade (modernise syntax)
    "B",   # flake8-bugbear (common bugs and design issues)
    "C4",  # flake8-comprehensions (cleaner comprehensions)
    "SIM", # flake8-simplify (simplify code patterns)
]
ignore = [
    "E501",  # line too long — handled by the formatter
]

[tool.ruff.lint.isort]
known-first-party = ["scripts"]

# ---------------------------------------------------------------------------
# Mypy — static type checking
# ---------------------------------------------------------------------------
[tool.mypy]
python_version         = "3.11"
strict                 = true
ignore_missing_imports = true   # third-party stubs (pandas, numpy) are optional

# Per-module overrides for files that are harder to type fully
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false   # test functions don't need full annotations

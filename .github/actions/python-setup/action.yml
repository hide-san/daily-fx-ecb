name: "Python Setup"
description: "Set up Python 3.11, restore pip cache, and install all pipeline dependencies."

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip

    - name: Install dependencies
      run: pip install -r requirements.txt
      shell: bash

name: Notebook Update Pipeline

# ---------------------------------------------------------------------------
# Generates and pushes EDA + modeling + getting-started notebooks to Kaggle.
#
# Job order:
#   resolve              -- resolve pair list
#   push-utils           -- generate & push shared fx_utils.py (once, not per-pair)
#   push-getting-started -- generate & push Getting Started notebooks (per pair)
#   push-eda             -- generate & push EDA notebooks (per pair, after getting-started)
#   push-modeling        -- generate & push Modeling notebooks (per pair, after eda)
#   summary              -- write result table
#
# The three push jobs run sequentially to avoid hitting Kaggle's CPU session
# limit (max 5 concurrent batch sessions).
# Within each job, pairs run one at a time (upload_concurrency=1).
# Each push waits for Kaggle to finish processing before moving on.
# ---------------------------------------------------------------------------

on:
  schedule:
    - cron: "0 16 * * 1"   # every Monday at 16:00 UTC

  workflow_dispatch:
    inputs:
      pairs:
        description: >
          Comma-separated pair codes (e.g. USDJPY,EURUSD).
          Leave blank to use pairs.txt.
        required: false
        default: "NZDJPY"

      upload_concurrency:
        description: "Max parallel notebook pushes per kind (1-5)."
        required: false
        default: "1"
        type: choice
        options: ["1", "2", "3", "4", "5"]

      dry_run:
        description: "Set to true to skip Kaggle push (smoke test only)."
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ==========================================================================
  # Job 1: Resolve
  # ==========================================================================
  resolve:
    name: "Resolve Pairs"
    runs-on: ubuntu-latest

    outputs:
      pairs_json: ${{ steps.resolve.outputs.pairs_json }}
      pair_count: ${{ steps.resolve.outputs.pair_count }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Resolve pair list
        id: resolve
        run: python scripts/resolve_pairs.py --pairs "${{ github.event.inputs.pairs }}"

      - name: Log resolved pairs
        run: echo "Processing ${{ steps.resolve.outputs.pair_count }} pairs."

  # ==========================================================================
  # Job 2: Push shared utils script (once, not per-pair)
  # ==========================================================================
  push-utils:
    name: "Push Utils Script"
    needs: resolve
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Generate utils script
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_utils_script.py

      - name: Push utils script to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --kind utils $DRY_RUN_FLAG

  # ==========================================================================
  # Job 3a: Getting Started notebooks (per pair, after utils is ready)
  # ==========================================================================
  push-getting-started:
    name: "${{ matrix.pair }}: Getting Started"
    needs: [resolve, push-utils]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(github.event.inputs.upload_concurrency || '1') }}
      matrix:
        pair: ${{ fromJson(needs.resolve.outputs.pairs_json) }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Generate ${{ matrix.pair }} Getting Started notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_getting_started.py --pair ${{ matrix.pair }}

      - name: Push ${{ matrix.pair }} Getting Started notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --pair ${{ matrix.pair }} --kind getting-started $DRY_RUN_FLAG

      - name: Save Getting Started notebook as artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-getting-started-${{ matrix.pair }}-${{ github.run_id }}
          path: notebooks/${{ matrix.pair }}/
          retention-days: 3

  # ==========================================================================
  # Job 3b: EDA notebooks (per pair, after getting-started completes)
  # ==========================================================================
  push-eda:
    name: "${{ matrix.pair }}: EDA"
    needs: [resolve, push-getting-started]
    if: always() && needs.resolve.result == 'success'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(github.event.inputs.upload_concurrency || '1') }}
      matrix:
        pair: ${{ fromJson(needs.resolve.outputs.pairs_json) }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Generate ${{ matrix.pair }} EDA notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_notebook.py --pair ${{ matrix.pair }}

      - name: Push ${{ matrix.pair }} EDA notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --pair ${{ matrix.pair }} --kind eda $DRY_RUN_FLAG

      - name: Save EDA notebook as artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-eda-${{ matrix.pair }}-${{ github.run_id }}
          path: notebooks/${{ matrix.pair }}/
          retention-days: 3

  # ==========================================================================
  # Job 3c: Modeling notebooks (per pair, after eda completes)
  # ==========================================================================
  push-modeling:
    name: "${{ matrix.pair }}: Modeling"
    needs: [resolve, push-eda]
    if: always() && needs.resolve.result == 'success'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(github.event.inputs.upload_concurrency || '1') }}
      matrix:
        pair: ${{ fromJson(needs.resolve.outputs.pairs_json) }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Generate ${{ matrix.pair }} Modeling notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_modeling_notebook.py --pair ${{ matrix.pair }}

      - name: Push ${{ matrix.pair }} Modeling notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --pair ${{ matrix.pair }} --kind modeling $DRY_RUN_FLAG

      - name: Save Modeling notebook as artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-modeling-${{ matrix.pair }}-${{ github.run_id }}
          path: notebooks/${{ matrix.pair }}/
          retention-days: 3

  # ==========================================================================
  # Job 4: Summary
  # ==========================================================================
  summary:
    name: "Notebook Summary"
    needs: [resolve, push-utils, push-getting-started, push-eda, push-modeling]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Write Markdown summary
        run: |
          {
            echo "## Notebook Update Pipeline -- $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Resolve pairs       | ${{ needs.resolve.result }} |"
            echo "| Push utils          | ${{ needs.push-utils.result }} |"
            echo "| Push getting-started (${{ needs.resolve.outputs.pair_count }} pairs) | ${{ needs.push-getting-started.result }} |"
            echo "| Push EDA (${{ needs.resolve.outputs.pair_count }} pairs)             | ${{ needs.push-eda.result }} |"
            echo "| Push modeling (${{ needs.resolve.outputs.pair_count }} pairs)        | ${{ needs.push-modeling.result }} |"
            echo ""
            echo "**Pairs input**: ${{ github.event.inputs.pairs || '(pairs.txt)' }}"
            echo "**Dry run**    : ${{ github.event.inputs.dry_run || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"

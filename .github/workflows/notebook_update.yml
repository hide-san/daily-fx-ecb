name: Notebook Update Pipeline

# ---------------------------------------------------------------------------
# Generates and pushes EDA + modeling + getting-started notebooks to Kaggle.
#
# Job order:
#   resolve        -- resolve pair list
#   push-utils     -- generate & push shared fx_utils.py (once, not per-pair)
#   push-pipeline  -- generate & push pipeline overview notebook (once, not per-pair)
#   push-notebooks -- per-pair job: generates and pushes all 3 notebook kinds
#                     in sequence (getting-started → eda → modeling).
#                     max-parallel=3 keeps Kaggle CPU sessions ≤ 3.
#   summary        -- write result table
#
# ⚠️  KAGGLE CPU SESSION LIMIT — do not change this structure without care:
#   Kaggle limits the number of concurrent CPU kernel sessions.
#   All 3 notebook kinds are pushed SEQUENTIALLY within each per-pair job so
#   that concurrent sessions == max-parallel (currently 3).
#   Splitting kinds into separate parallel jobs would multiply concurrency by
#   the number of kinds and exceed the Kaggle CPU limit.
# ---------------------------------------------------------------------------

on:
  schedule:
    - cron: "0 16 * * 1"   # every Monday at 16:00 UTC

  workflow_dispatch:
    inputs:
      pairs:
        description: >
          Comma-separated pair codes (e.g. USDJPY,EURUSD).
          Leave blank to process all pairs from pairs.txt.
          For a quick test, enter: NZDJPY
        required: false
        default: ""

      upload_concurrency:
        description: "Max parallel pairs (1-5). Keep ≤ 3 to avoid Kaggle CPU limit."
        required: false
        default: "3"
        type: choice
        options: ["1", "2", "3", "4", "5"]

      dry_run:
        description: "Set to true to skip Kaggle push (smoke test only)."
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ==========================================================================
  # Job 1: Resolve
  # ==========================================================================
  resolve:
    name: "Resolve Pairs"
    runs-on: ubuntu-latest

    outputs:
      pairs_json: ${{ steps.resolve.outputs.pairs_json }}
      pair_count: ${{ steps.resolve.outputs.pair_count }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Resolve pair list
        id: resolve
        run: python scripts/resolve_pairs.py --pairs "${{ github.event.inputs.pairs }}"

      - name: Log resolved pairs
        run: echo "Processing ${{ steps.resolve.outputs.pair_count }} pairs."

  # ==========================================================================
  # Job 2a: Push pipeline overview notebook (once, not per-pair)
  #
  # Independent of resolve — no pair matrix needed.
  # enable_internet=true in kernel metadata allows the notebook to fetch
  # KAGGLE_README.md and CHANGELOG.md from GitHub at runtime.
  # ==========================================================================
  push-pipeline:
    name: "Push Pipeline Overview Notebook"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Generate pipeline overview notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_notebook_pipeline.py

      - name: Push pipeline overview notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --kind pipeline $DRY_RUN_FLAG

  # ==========================================================================
  # Job 2b: Push shared utils script (once, not per-pair)
  # ==========================================================================
  push-utils:
    name: "Push Utils Script"
    needs: resolve
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Generate utils script
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_utils_script.py

      - name: Push utils script to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --kind utils $DRY_RUN_FLAG

  # ==========================================================================
  # Job 3: Push all notebooks per pair (getting-started → eda → modeling)
  #
  # Pairs run in parallel (max-parallel=3).  Within each pair the three
  # notebook kinds are pushed sequentially so only one Kaggle CPU session
  # per pair is active at a time.  With max-parallel=3 the pipeline uses
  # at most 3 concurrent Kaggle sessions.
  # ==========================================================================
  push-notebooks:
    name: "${{ matrix.pair }}: Notebooks"
    needs: [resolve, push-utils]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(github.event.inputs.upload_concurrency || '3') }}
      matrix:
        pair: ${{ fromJson(needs.resolve.outputs.pairs_json) }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup

      - name: Generate ${{ matrix.pair }} Getting Started notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_notebook_getting_started.py --pair ${{ matrix.pair }}

      - name: Push ${{ matrix.pair }} Getting Started notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --pair ${{ matrix.pair }} --kind getting-started $DRY_RUN_FLAG

      - name: Generate ${{ matrix.pair }} EDA notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_notebook_eda.py --pair ${{ matrix.pair }}

      - name: Push ${{ matrix.pair }} EDA notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --pair ${{ matrix.pair }} --kind eda $DRY_RUN_FLAG

      - name: Generate ${{ matrix.pair }} Modeling notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: python scripts/create_notebook_modeling.py --pair ${{ matrix.pair }}

      - name: Push ${{ matrix.pair }} Modeling notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME:  ${{ secrets.KAGGLE_USERNAME }}
        run: |
          DRY_RUN_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          python scripts/upload_notebook.py --pair ${{ matrix.pair }} --kind modeling $DRY_RUN_FLAG

      - name: Save notebooks as artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-notebooks-${{ matrix.pair }}-${{ github.run_id }}
          path: notebooks/${{ matrix.pair }}/
          retention-days: 3

  # ==========================================================================
  # Job 4: Summary
  # ==========================================================================
  summary:
    name: "Notebook Summary"
    needs: [resolve, push-pipeline, push-utils, push-notebooks]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Write Markdown summary
        run: |
          {
            echo "## Notebook Update Pipeline -- $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Resolve pairs   | ${{ needs.resolve.result }} |"
            echo "| Push pipeline   | ${{ needs.push-pipeline.result }} |"
            echo "| Push utils      | ${{ needs.push-utils.result }} |"
            echo "| Push notebooks (${{ needs.resolve.outputs.pair_count }} pairs × 3 kinds) | ${{ needs.push-notebooks.result }} |"
            echo ""
            echo "**Pairs input**: ${{ github.event.inputs.pairs || '(pairs.txt)' }}"
            echo "**Dry run**    : ${{ github.event.inputs.dry_run || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"
